name: Repository safety

on:
  push:
  pull_request:

jobs:
  restricted-data-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check for restricted data
        run: python scripts/check_repository_safety.py

